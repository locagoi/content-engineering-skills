name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Unit tests (zero-dependency GEO helpers)
        run: npm test
      - name: Syntax-check all scripts
        run: for f in scanner/*.mjs geo/*.mjs test/*.mjs; do node --check "$f"; done
